evaluation:
  model_name: portfolio_gan
  run_id: unknown
  prediction_source: model
  split: test
  holding_threshold: 0.0001
  normalize_weights: true
  require_full_metrics: false
  # Model type: 'carhart' (default 4-factor) or 'news_aware' (4 Carhart + 5 news factors)
  model_type: news_aware
  factor_columns:
    - market_beta
    - SMB
    - HML
    - UMD

  columns:
    fund_id: fund_id
    date: date
    asset_id: asset_id
    w_true: w_true
    w_pred: w_pred
    w_prev: w_prev
    label: style_label
    model_name: model_name
    run_id: run_id
    split: split
    prediction_source: prediction_source
    return: ret
    case_id: case_id
    w_original: w_original
    w_transferred: w_transferred
    w_prev_transferred: w_prev_transferred

  inputs:
    portfolio_predictions: artifacts/news_aware/evaluation/portfolio_predictions_news_aware.parquet
    representation_embeddings: artifacts/news_aware/embeddings/strategy_embeddings_news_aware.parquet
    factor_exposures: raw/stock_characteristics.parquet
    carhart_factors: raw/carhart_factors.parquet
    asset_returns: raw/stock_returns.parquet
    counterfactual_transfers: artifacts/news_aware/evaluation/counterfactual_transfers_news_aware.parquet
    # News factors for news_aware model (if model_type == news_aware)
    news_factors: "../LLM news scoring/scores_monthly/news_factors_orthogonalized_2010_2024.csv"
    

  factor_exposure_estimation:
    enabled: true
    output_path: artifacts/news_aware/evaluation/carhart_betas_news_aware.parquet
    output_path_news_aware: artifacts/news_aware/evaluation/news_aware_betas_news_aware.parquet
    lookback_periods: 36
    min_periods: 24
    ridge_penalty: 0.00000001
    use_cache: true
    asset_id_column: permno
    date_column: date
    return_column: ret
    risk_free_column: rf
    factor_column_map:
      mktrf: market_beta
      smb: SMB
      hml: HML
      umd: UMD

  export:
    enabled: true
    splits:
      - train
      - val
      - test
    batch_size: 128

  labels:
    enabled: true
    path: raw/lipper.csv
    encoding: latin1
    fund_id_column: crsp_fundno
    date_column: caldt
    source_label_column: lipper_class
    output_column: style_label
    merge_method: asof_backward

  representation:
    classifier: linear_svm
    average_embeddings_over_time: false
    train_split: train
    eval_split: test
    random_seed: 42

  frontier:
    enabled: true
    method: mean_variance_long_only_random_frontier
    weight_column: w_pred
    num_random_portfolios: 1000
    num_random_reference_portfolios: 200
    covariance_shrinkage: 0.0
    lookback_periods: 36
    min_periods: 3
    long_only: true
    random_seed: 42

  counterfactual:
    enabled: true
